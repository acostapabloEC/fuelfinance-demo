<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fuel MCP · Acme SaaS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0a0a12;
    --surface:  #0f0f1a;
    --border:   #1c1c2e;
    --border2:  #252538;
    --text:     #e2e2f0;
    --muted:    #5a5a7a;
    --accent:   #7c6fff;
    --accent2:  #5f52cc;
    --green:    #4ade80;
    --yellow:   #fbbf24;
    --red:      #f87171;
    --user-bg:  #1c1c30;
    --font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono:     'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: fixed; top: 0; left: 0; right: 0;
    z-index: 100; height: 56px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; letter-spacing: -.02em; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); flex-shrink: 0; }
  .logo-sep { color: var(--border2); font-weight: 300; margin: 0 2px; }
  .company-tag { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .period-badge { padding: 2px 8px; border: 1px solid var(--border2); border-radius: 4px; font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-label { font-size: 11px; color: var(--muted); }
  .btn-header { padding: 5px 12px; border: 1px solid var(--border2); background: none; color: var(--muted); font-size: 12px; border-radius: 6px; cursor: pointer; transition: all .15s; font-family: var(--font); }
  .btn-header:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Root layout ── */
  #app { position: fixed; top: 56px; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; }

  /* ── Chat column ── */
  #chat-col { flex: 1; min-width: 0; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; }


  /* ── Thread ── */
  #thread { flex: 1; overflow-y: auto; padding: 24px 24px 0; scroll-behavior: smooth; }
  #thread::-webkit-scrollbar { width: 4px; }
  #thread::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── Welcome ── */
  #welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0 32px; text-align: center; }
  .welcome-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #2a2060, #1a1535); border: 1px solid var(--border2); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 22px; }
  .welcome-title { font-size: 22px; font-weight: 600; letter-spacing: -.03em; margin-bottom: 8px; }
  .welcome-sub { font-size: 13px; color: var(--muted); line-height: 1.6; max-width: 360px; }
  .prompts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 28px; width: 100%; max-width: 560px; }
  .prompt-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; cursor: pointer; text-align: left; transition: all .2s; font-family: var(--font); }
  .prompt-chip:hover { border-color: var(--accent); background: #14142a; transform: translateY(-1px); }
  .chip-label { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .chip-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ── Messages ── */
  .msg { margin-bottom: 20px; display: flex; gap: 12px; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .msg.ai   .msg-avatar { background: linear-gradient(135deg, #2a2060, #1a1535); border: 1px solid var(--border2); color: var(--accent); }
  .msg.user .msg-avatar { background: #1c2030; border: 1px solid var(--border2); color: var(--muted); }
  .msg-body { max-width: 86%; display: flex; flex-direction: column; gap: 4px; }
  .msg-text { padding: 14px 18px; border-radius: 12px; font-size: 13.5px; line-height: 1.75; }
  .msg.ai   .msg-text { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; font-family: var(--font); }
  .msg.user .msg-text { background: var(--user-bg); border: 1px solid var(--border2); border-radius: 12px 4px 12px 12px; font-family: var(--font); }
  .msg-text h2 { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .msg-text h3 { font-size: 12px; font-weight: 600; color: var(--accent); margin: 14px 0 6px; }
  .msg-text h2:first-child, .msg-text h3:first-child { margin-top: 0; }
  .msg-text ul { list-style: none; padding: 0; margin: 0 0 2px; display: flex; flex-direction: column; gap: 4px; }
  .msg-text li { padding-left: 16px; position: relative; font-size: 13.5px; }
  .msg-text li::before { content: '•'; position: absolute; left: 0; color: var(--muted); }
  .msg-text p { margin: 0 0 8px; }
  .msg-text p:last-child { margin-bottom: 0; }
  .msg-text strong { color: var(--green); font-weight: 600; }
  .msg-text code { font-family: var(--mono); font-size: 12px; background: #1a1a2e; padding: 1px 5px; border-radius: 4px; }
  .msg-text ol { padding-left: 18px; margin: 0 0 8px; display: flex; flex-direction: column; gap: 4px; }
  .msg-text ol li { list-style: decimal; padding-left: 4px; }
  .msg-text ol li::before { display: none; }
  .msg-sources { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .source-badge { font-size: 10px; padding: 2px 7px; border: 1px solid var(--border2); border-radius: 100px; color: var(--muted); }
  .msg-time { font-size: 10px; color: var(--muted); padding: 0 4px; }

  /* ── Typing ── */
  .typing-dots { display: flex; gap: 4px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; width: fit-content; }
  .typing-dots span { width: 5px; height: 5px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); opacity: .7; } }

  /* ── Bottom ── */
  #bottom { padding: 14px 24px 18px; border-top: 1px solid var(--border); background: var(--bg); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  #input-box { flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 12px 16px; font-size: 14px; color: var(--text); font-family: var(--font); resize: none; min-height: 46px; max-height: 160px; outline: none; line-height: 1.5; transition: border-color .2s; overflow-y: auto; }
  #input-box:focus { border-color: var(--accent); }
  #input-box::placeholder { color: var(--muted); }
  #send-btn { width: 40px; height: 40px; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s, opacity .15s; margin-bottom: 3px; }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; fill: white; }

  /* ── Charts ── */
  .chart-wrap { margin-top: 10px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: #07070f; padding: 16px 18px 12px; }
  .chart-wrap svg { display: block; width: 100%; overflow: visible; }
  .chart-title { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  /* ── Loading bar ── */
  #loading-bar { position: fixed; top: 56px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), #a78bfa, var(--accent)); background-size: 200% 100%; animation: shimmer 1.5s infinite; display: none; z-index: 99; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Fuel MCP
    <span class="logo-sep">/</span>
    <div class="company-tag">
      Acme SaaS Inc.
      <span class="period-badge">Jun 2026</span>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span class="status-label">Live data</span>
    <button class="btn-header" onclick="exportChat()">↗ Export</button>
  </div>
</header>

<div id="loading-bar"></div>

<div id="app">

  <!-- Chat column -->
  <div id="chat-col">
    <div id="thread">
      <div id="welcome">
        <div class="welcome-icon">⚡</div>
        <div class="welcome-title">Ask your finances anything</div>
        <div class="welcome-sub">Live data from Stripe, QuickBooks, Gusto, HubSpot, and Carta. No hallucinations.</div>
        <div class="prompts-grid">
          <button class="prompt-chip" onclick="sendPrompt(this.dataset.q)" data-q="Am I ready to raise?">
            <div class="chip-label">Am I ready to raise?</div>
            <div class="chip-meta">Series A readiness check</div>
          </button>
          <button class="prompt-chip" onclick="sendPrompt(this.dataset.q)" data-q="If we hire 2 AEs and 1 Sr Engineer in Q3, what happens to our runway?">
            <div class="chip-label">Hiring scenario: 2 AEs + 1 engineer</div>
            <div class="chip-meta">Runway &amp; EBITDA impact by year-end</div>
          </button>
          <button class="prompt-chip" onclick="sendPrompt(this.dataset.q)" data-q="Show MRR trend for the last 6 months">
            <div class="chip-label">MRR trend — last 6 months</div>
            <div class="chip-meta">With ARR, gross margin &amp; EBITDA</div>
          </button>
          <button class="prompt-chip" onclick="sendPrompt(this.dataset.q)" data-q="What's holding up a clean close?">
            <div class="chip-label">What's holding up a clean close?</div>
            <div class="chip-meta">Prioritized action list</div>
          </button>
          <button class="prompt-chip" onclick="sendPrompt(this.dataset.q)" data-q="Which customers are at churn risk?">
            <div class="chip-label">Which customers are at churn risk?</div>
            <div class="chip-meta">Cohort retention &amp; signals</div>
          </button>
          <button class="prompt-chip" onclick="sendPrompt(this.dataset.q)" data-q="Show me the sales pipeline and forecast">
            <div class="chip-label">Pipeline &amp; Dec 2026 forecast</div>
            <div class="chip-meta">Weighted ARR &amp; coverage ratio</div>
          </button>
        </div>
      </div>
    </div>

    <div id="bottom">
      <div class="input-row">
        <textarea id="input-box" placeholder="Ask anything about your finances…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="handleSend()" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>


</div>

<script>
  const thread  = document.getElementById('thread');
  const welcome = document.getElementById('welcome');
  const inputEl = document.getElementById('input-box');
  const sendBtn = document.getElementById('send-btn');
  const loadBar = document.getElementById('loading-bar');
  let   msgCount = 0;
  let   chatLog  = [];

  // ── Sources ──────────────────────────────────────────────────────────────────
  const SOURCES = {
    mrr: ['Stripe','QB'], arr: ['Stripe','QB'], revenue: ['Stripe','QB'],
    churn: ['Stripe','HubSpot'], cohort: ['Stripe','HubSpot'], retention: ['Stripe'],
    runway: ['QB','Stripe'], cash: ['QB','Stripe'], burn: ['QB'],
    hire: ['Gusto','QB'], headcount: ['Gusto'], team: ['Gusto'], people: ['Gusto'],
    pipeline: ['HubSpot'], sales: ['HubSpot'], deals: ['HubSpot'], forecast: ['HubSpot','QB'],
    raise: ['QB','Stripe','Carta'], investor: ['Carta','QB'], series: ['Carta'],
    ebitda: ['QB'], margin: ['QB','Stripe'], opex: ['QB','Gusto'], cogs: ['QB','Stripe'],
    deferred: ['QB'], close: ['QB'], memo: ['QB','Stripe','Gusto'],
    unit: ['Stripe','QB'], ltv: ['Stripe','QB'], cac: ['HubSpot','QB'],
  };

  function getSources(q) {
    const lq = q.toLowerCase();
    const found = new Set();
    for (const [kw, srcs] of Object.entries(SOURCES)) {
      if (lq.includes(kw)) srcs.forEach(s => found.add(s));
    }
    if (!found.size) { found.add('QB'); found.add('Stripe'); }
    return [...found];
  }

  function ts() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

  // ── Markdown renderer ────────────────────────────────────────────────────────
  function renderMarkdown(text) {
    const esc    = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const inline = s => esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>');
    const lines  = text.split('\n');
    let html = '', inUl = false, inOl = false;
    const closeList = () => { if (inUl) { html += '</ul>'; inUl = false; } if (inOl) { html += '</ol>'; inOl = false; } };
    for (const raw of lines) {
      const line = raw.trimStart();
      if      (line.startsWith('## '))               { closeList(); html += `<h2>${inline(line.slice(3))}</h2>`; }
      else if (line.startsWith('### '))              { closeList(); html += `<h3>${inline(line.slice(4))}</h3>`; }
      else if (/^\d+\.\s/.test(line))               { if (inUl) { html += '</ul>'; inUl = false; } if (!inOl) { html += '<ol>'; inOl = true; } html += `<li>${inline(line.replace(/^\d+\.\s/,''))}</li>`; }
      else if (line.startsWith('• ') || line.startsWith('* ')) { if (inOl) { html += '</ol>'; inOl = false; } if (!inUl) { html += '<ul>'; inUl = true; } html += `<li>${inline(line.slice(2))}</li>`; }
      else if (line === '')                          { closeList(); }
      else                                           { closeList(); html += `<p>${inline(line)}</p>`; }
    }
    closeList();
    return html;
  }

  // ── SVG Chart Renderer ───────────────────────────────────────────────────────
  function renderChart(c) {
    const W = 520, PAD = { t: 8, r: 16, b: 36, l: 52 };
    const inner = { w: W - PAD.l - PAD.r };
    const fmt = v => c.yformat === '$k' ? '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v) : '$' + v.toLocaleString();

    if (c.type === 'bar') return renderBar(c, W, PAD, inner, fmt);
    if (c.type === 'line') return renderLine(c, W, PAD, inner, fmt);
    if (c.type === 'hbar') return renderHBar(c, W, fmt);
    if (c.type === 'donut') return renderDonut(c, fmt);
    return '';
  }

  function svgText(x, y, txt, opts = {}) {
    const { anchor = 'middle', fill = '#5a5a7a', size = 10, weight = 'normal' } = opts;
    return `<text x="${x}" y="${y}" text-anchor="${anchor}" fill="${fill}" font-size="${size}" font-weight="${weight}" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${txt}</text>`;
  }

  function renderBar(c, W, PAD, inner, fmt) {
    const ds = c.datasets;
    const n = c.labels.length;
    const allVals = ds.flatMap(d => d.values);
    const maxV = Math.max(...allVals) * 1.15 || 1;
    const H = 180, BAR_H = H - PAD.t - PAD.b;
    const groupW = inner.w / n;
    const barW = Math.min(groupW / ds.length - 4, 28);

    let ticks = '', bars = '', xLabels = '';
    const TICK_COUNT = 4;
    for (let i = 0; i <= TICK_COUNT; i++) {
      const v = (maxV / TICK_COUNT) * i;
      const y = PAD.t + BAR_H - (v / maxV) * BAR_H;
      ticks += `<line x1="${PAD.l - 4}" y1="${y}" x2="${PAD.l + inner.w}" y2="${y}" stroke="#1c1c2e" stroke-width="1"/>`;
      ticks += svgText(PAD.l - 7, y + 3, fmt(Math.round(v)), { anchor: 'end' });
    }

    c.labels.forEach((lbl, i) => {
      const gx = PAD.l + i * groupW + groupW / 2;
      ds.forEach((d, di) => {
        const v = d.values[i];
        const bh = (v / maxV) * BAR_H;
        const x = gx - (ds.length * barW) / 2 + di * barW;
        const y = PAD.t + BAR_H - bh;
        bars += `<rect x="${x}" y="${y}" width="${barW - 2}" height="${bh}" fill="${d.color}" rx="2" opacity="0.9"/>`;
      });
      xLabels += svgText(gx, PAD.t + BAR_H + 16, lbl);
    });

    const legend = ds.map((d, i) =>
      `<circle cx="${PAD.l + i * 90}" cy="${H - 2}" r="4" fill="${d.color}"/>` +
      svgText(PAD.l + i * 90 + 8, H + 2, d.label, { anchor: 'start' })
    ).join('');

    return `<svg viewBox="0 0 ${W} ${H + 14}" xmlns="http://www.w3.org/2000/svg">${ticks}${bars}${xLabels}${legend}</svg>`;
  }

  function renderLine(c, W, PAD, inner, fmt) {
    const ds = c.datasets;
    const n = c.labels.length;
    const allVals = ds.flatMap(d => d.values);
    const maxV = Math.max(...allVals) * 1.15 || 1;
    const minV = 0;
    const H = 180, BAR_H = H - PAD.t - PAD.b;
    const xStep = inner.w / (n - 1);

    let ticks = '', lines = '', dots = '', xLabels = '';
    const TICK_COUNT = 4;
    for (let i = 0; i <= TICK_COUNT; i++) {
      const v = (maxV / TICK_COUNT) * i;
      const y = PAD.t + BAR_H - (v / maxV) * BAR_H;
      ticks += `<line x1="${PAD.l}" y1="${y}" x2="${PAD.l + inner.w}" y2="${y}" stroke="#1c1c2e" stroke-width="1"/>`;
      ticks += svgText(PAD.l - 7, y + 3, fmt(Math.round(v)), { anchor: 'end' });
    }

    ds.forEach(d => {
      const pts = d.values.map((v, i) => {
        const x = PAD.l + i * xStep;
        const y = PAD.t + BAR_H - (v / maxV) * BAR_H;
        return `${x},${y}`;
      });
      lines += `<polyline points="${pts.join(' ')}" fill="none" stroke="${d.color}" stroke-width="2" stroke-linejoin="round"/>`;
      d.values.forEach((v, i) => {
        const x = PAD.l + i * xStep;
        const y = PAD.t + BAR_H - (v / maxV) * BAR_H;
        dots += `<circle cx="${x}" cy="${y}" r="3.5" fill="${d.color}" stroke="#07070f" stroke-width="1.5"/>`;
      });
    });

    c.labels.forEach((lbl, i) => {
      xLabels += svgText(PAD.l + i * xStep, PAD.t + BAR_H + 16, lbl);
    });

    const legend = ds.map((d, i) =>
      `<circle cx="${PAD.l + i * 90}" cy="${H - 2}" r="4" fill="${d.color}"/>` +
      svgText(PAD.l + i * 90 + 8, H + 2, d.label, { anchor: 'start' })
    ).join('');

    return `<svg viewBox="0 0 ${W} ${H + 14}" xmlns="http://www.w3.org/2000/svg">${ticks}${lines}${dots}${xLabels}${legend}</svg>`;
  }

  function renderHBar(c, W, fmt) {
    const d = c.datasets[0];
    const n = c.labels.length;
    const maxV = Math.max(...d.values) * 1.1 || 1;
    const BAR_H = 14, ROW_H = 26, PAD_L = 110, PAD_R = 60;
    const H = n * ROW_H + 10;
    const barW = W - PAD_L - PAD_R;
    let bars = '';

    c.labels.forEach((lbl, i) => {
      const v = d.values[i];
      const w = (v / maxV) * barW;
      const y = i * ROW_H + 8;
      const color = d.colors ? d.colors[i] : '#7c6fff';
      const pct = d.pcts ? `${d.pcts[i]}%` : '';
      bars += `<rect x="${PAD_L}" y="${y}" width="${w}" height="${BAR_H}" fill="${color}" rx="3" opacity="0.85"/>`;
      bars += svgText(PAD_L - 6, y + BAR_H - 2, lbl.length > 14 ? lbl.slice(0, 13) + '…' : lbl, { anchor: 'end', fill: '#b0b0c8', size: 10 });
      bars += svgText(PAD_L + w + 6, y + BAR_H - 2, fmt(v) + (pct ? ` · ${pct}` : ''), { anchor: 'start', fill: '#e2e2f0', size: 10 });
    });

    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
  }

  function renderDonut(c, fmt) {
    const W = 320, CX = 100, CY = 100, R = 72, r = 42;
    const d = c.datasets[0];
    const total = d.values.reduce((a, b) => a + b, 0);
    let startAngle = -Math.PI / 2;
    let slices = '', legend = '';

    d.values.forEach((v, i) => {
      const angle = (v / total) * 2 * Math.PI;
      const end = startAngle + angle;
      const x1 = CX + R * Math.cos(startAngle), y1 = CY + R * Math.sin(startAngle);
      const x2 = CX + R * Math.cos(end),         y2 = CY + R * Math.sin(end);
      const ix1 = CX + r * Math.cos(startAngle), iy1 = CY + r * Math.sin(startAngle);
      const ix2 = CX + r * Math.cos(end),         iy2 = CY + r * Math.sin(end);
      const large = angle > Math.PI ? 1 : 0;
      const pct = Math.round(v / total * 100);
      slices += `<path d="M${ix1},${iy1} L${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${ix2},${iy2} A${r},${r} 0 ${large} 0 ${ix1},${iy1} Z" fill="${d.colors[i]}" opacity="0.9"/>`;
      if (pct > 5) {
        const mx = CX + (R + r) / 2 * Math.cos(startAngle + angle / 2);
        const my = CY + (R + r) / 2 * Math.sin(startAngle + angle / 2);
        slices += svgText(mx, my + 4, `${pct}%`, { fill: '#fff', size: 9, weight: '600' });
      }
      const ly = 28 + i * 20;
      legend += `<rect x="210" y="${ly - 9}" width="10" height="10" fill="${d.colors[i]}" rx="2"/>`;
      legend += svgText(224, ly, c.labels[i], { anchor: 'start', fill: '#b0b0c8', size: 10 });
      legend += svgText(310, ly, fmt(v), { anchor: 'end', fill: '#e2e2f0', size: 10 });
      startAngle = end;
    });

    legend += svgText(260, 118, 'Total', { fill: '#5a5a7a', size: 9 });
    legend += svgText(310, 118, fmt(total), { anchor: 'end', fill: '#e2e2f0', size: 10, weight: '600' });

    return `<svg viewBox="0 0 ${W} 200" xmlns="http://www.w3.org/2000/svg">${slices}${legend}</svg>`;
  }

  function sendPrompt(q) { inputEl.value = q; handleSend(); }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }

  // ── Message rendering ────────────────────────────────────────────────────────
  function appendMsg(role, text, sources, chart) {
    if (msgCount === 0) welcome.style.display = 'none';
    msgCount++;

    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'ai' ? '⚡' : 'P';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const bubble = document.createElement('div');
    bubble.className = 'msg-text';
    if (role === 'ai') { bubble.innerHTML = renderMarkdown(text); }
    else               { bubble.textContent = text; }
    body.appendChild(bubble);

    if (role === 'ai' && chart) {
      const cw = document.createElement('div');
      cw.className = 'chart-wrap';
      const title = document.createElement('div');
      title.className = 'chart-title';
      title.textContent = chart.title;
      cw.appendChild(title);
      cw.innerHTML += renderChart(chart);
      body.appendChild(cw);
    }

    if (role === 'ai' && sources && sources.length) {
      const row = document.createElement('div');
      row.className = 'msg-sources';
      sources.forEach(s => { const b = document.createElement('span'); b.className = 'source-badge'; b.textContent = s; row.appendChild(b); });
      body.appendChild(row);
    }

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = ts();
    body.appendChild(time);

    wrap.appendChild(av);
    wrap.appendChild(body);
    thread.appendChild(wrap);
    thread.scrollTop = thread.scrollHeight;
  }

  function appendTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai'; wrap.id = 'typing';
    const av = document.createElement('div');
    av.className = 'msg-avatar'; av.textContent = '⚡';
    const body = document.createElement('div');
    body.className = 'msg-body';
    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    body.appendChild(dots);
    wrap.appendChild(av); wrap.appendChild(body);
    thread.appendChild(wrap);
    thread.scrollTop = thread.scrollHeight;
    return wrap;
  }

  // ── Send ─────────────────────────────────────────────────────────────────────
  async function handleSend() {
    const q = inputEl.value.trim();
    if (!q) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    loadBar.style.display = 'block';

    appendMsg('user', q, null);
    chatLog.push({ role: 'user', text: q });

    const typing = appendTyping();

    try {
      const res  = await fetch('/ask', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({question: q}) });
      const data = await res.json();
      typing.remove();
      const srcs = getSources(q);
      appendMsg('ai', data.answer || 'No answer returned.', srcs, data.chart || null);
      chatLog.push({ role: 'ai', text: data.answer, sources: srcs, chart: data.chart || null });
    } catch (err) {
      typing.remove();
      appendMsg('ai', `Connection error: ${err.message}`, []);
    }

    sendBtn.disabled = false;
    loadBar.style.display = 'none';
    inputEl.focus();
  }

  // ── Export ───────────────────────────────────────────────────────────────────
  function exportChat() {
    const msgs = chatLog.map(m => {
      const isAi = m.role === 'ai';
      const srcs = (m.sources && m.sources.length) ? `<div class="srcs">${m.sources.map(s=>`<span>${s}</span>`).join('')}</div>` : '';
      const body = isAi ? renderMarkdown(m.text) : `<p>${m.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`;
      return `<div class="msg ${isAi?'ai':'user'}"><div class="av">${isAi?'⚡':'P'}</div><div class="body"><div class="bubble">${body}</div>${srcs}</div></div>`;
    }).join('');

    const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Fuel MCP Export — Acme SaaS · June 2026</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a12;color:#e2e2f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}header{background:#0f0f1a;border-bottom:1px solid #1c1c2e;padding:18px 40px;display:flex;align-items:center;justify-content:space-between}.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}.dot{width:8px;height:8px;border-radius:50%;background:#7c6fff;box-shadow:0 0 8px #7c6fff}.meta{font-size:12px;color:#5a5a7a}.thread{max-width:800px;margin:40px auto;padding:0 24px 60px;display:flex;flex-direction:column;gap:20px}.msg{display:flex;gap:12px}.msg.user{flex-direction:row-reverse}.av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;margin-top:2px}.msg.ai .av{background:linear-gradient(135deg,#2a2060,#1a1535);border:1px solid #252538;color:#7c6fff}.msg.user .av{background:#1c2030;border:1px solid #252538;color:#5a5a7a}.body{max-width:85%;display:flex;flex-direction:column;gap:6px}.bubble{padding:14px 18px;border-radius:12px;font-size:13.5px;line-height:1.75}.msg.ai .bubble{background:#0f0f1a;border:1px solid #1c1c2e;border-radius:4px 12px 12px 12px}.msg.user .bubble{background:#1c1c30;border:1px solid #252538;border-radius:12px 4px 12px 12px}.bubble h2{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#5a5a7a;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid #1c1c2e}.bubble h3{font-size:12px;font-weight:600;color:#7c6fff;margin:14px 0 6px}.bubble h2:first-child,.bubble h3:first-child{margin-top:0}.bubble ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:4px}.bubble li{padding-left:16px;position:relative}.bubble li::before{content:'•';position:absolute;left:0;color:#5a5a7a}.bubble ol{padding-left:18px;display:flex;flex-direction:column;gap:4px}.bubble ol li{list-style:decimal;padding-left:4px}.bubble ol li::before{display:none}.bubble p{margin:0 0 8px}.bubble p:last-child{margin-bottom:0}.bubble strong{color:#4ade80;font-weight:600}.bubble code{font-family:'SF Mono','Fira Code',monospace;font-size:12px;background:#1a1a2e;padding:1px 5px;border-radius:4px}.srcs{display:flex;gap:5px;flex-wrap:wrap}.srcs span{font-size:10px;padding:2px 7px;border:1px solid #252538;border-radius:100px;color:#5a5a7a}</style></head><body><header><div class="logo"><div class="dot"></div> Fuel MCP <span style="color:#252538;margin:0 4px">/</span><span style="font-weight:400;color:#5a5a7a">Acme SaaS Inc.</span></div><div class="meta">June 2026 · Exported ${new Date().toLocaleString()}</div></header><div class="thread">${msgs||'<p style="color:#5a5a7a;text-align:center;padding:60px 0">No conversation to export.</p>'}</div></body></html>`;

    const blob = new Blob([html],{type:'text/html'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download='fuel-mcp-export.html'; a.click();
    URL.revokeObjectURL(url);
  }

  window.addEventListener('load', () => inputEl.focus());
</script>
</body>
</html>
